// ── Carte Leaflet CRS.Simple ──────────────────────────────────────
const TILE_SIZE = 512;
const GRID_ROWS = 18;
const GRID_COLS = 18;
const MAP_W     = TILE_SIZE * GRID_COLS; // 9216
const MAP_H     = TILE_SIZE * GRID_ROWS; // 9216

const map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -4,
    maxZoom: 3,
    zoomSnap: 0.5,
    attributionControl: false,
});

const bounds = [[0, 0], [MAP_H, MAP_W]];

// ── Tuiles : lazy loading par viewport ───────────────────────────
// Seules les tuiles visibles (+ marge 50%) sont créées, par lots de 10/frame.
const tilesAdded = {}; // "col_row" → L.imageOverlay

function refreshTiles() {
    const vb = map.getBounds().pad(0.5);
    const toAdd = [];
    for (let row = 0; row < GRID_ROWS; row++) {
        for (let col = 0; col < GRID_COLS; col++) {
            const key = `${col}_${row}`;
            if (tilesAdded[key]) continue;
            const latMin = MAP_H - (row + 1) * TILE_SIZE;
            const latMax = MAP_H - row * TILE_SIZE;
            const tb = L.latLngBounds([[latMin, col * TILE_SIZE], [latMax, (col + 1) * TILE_SIZE]]);
            if (vb.overlaps(tb)) toAdd.push({ key, tb });
        }
    }
    function addBatch(i) {
        const end = Math.min(i + 10, toAdd.length);
        for (let j = i; j < end; j++) {
            const { key, tb } = toAdd[j];
            tilesAdded[key] = L.imageOverlay(`data/map_tiles/${key}.png`, tb, { interactive: false }).addTo(map);
        }
        if (end < toAdd.length) requestAnimationFrame(() => addBatch(end));
    }
    if (toAdd.length) addBatch(0);
}

map.on('moveend zoomend', refreshTiles);
map.fitBounds(bounds);

// ── Conversion coordonnées jeu → pixel ───────────────────────────
// Bounds du monde (depuis sector table zone 50201001)
const GAME_X_MIN = -691576;
const GAME_X_MAX =  113589;
const GAME_Y_MIN = -474514;
const GAME_Y_MAX =  374887;

// Transformation calibrée sur 2 points connus :
//   Moonrise Hill      game(-360175, 167717) → px(3802, 6939)
//   Île du Croissant   game(-333231, 208301) → px(4190, 7550)
// Régression linéaire sur 3 points (Moonrise Hill, Île du Croissant, Liones-Ouest)
// Erreur max < 13px sur 9216px
// Régression linéaire sur 3 points — erreur max 2px sur 9216px
const CAL = {
    ax: 0.014371,
    bx: 8978.90,
    ay: 0.014361,
    by: 4528.21,
};

function gameToLeaflet(gameX, gameY) {
    const px = CAL.ax * gameX + CAL.bx;
    const py = CAL.ay * gameY + CAL.by;
    return L.latLng(MAP_H - py, px);
}

function leafletToGame(latlng) {
    const px = latlng.lng;
    const py = MAP_H - latlng.lat;
    const gameX = (px - CAL.bx) / CAL.ax;
    const gameY = (py - CAL.by) / CAL.ay;
    return { x: Math.round(gameX), y: Math.round(gameY) };
}

const wpIcon = L.icon({
    iconUrl: 'data/Waypoint_Open.png',
    iconSize: [28, 28],
    iconAnchor: [14, 14],
    popupAnchor: [0, -14],
});

const waypointLayer = L.layerGroup();

     .bindPopup(`<b>${wp.name}</b><br><small>jeu: (${Math.round(wp.x)}, ${Math.round(wp.y)})</small>`)

waypointLayer.addTo(map);

// ── Monstres capturables ──────────────────────────────────────────
// Cluster (mode "tous")
const petCluster = L.markerClusterGroup({
    maxClusterRadius: 40,
    iconCreateFunction(cluster) {
        const n = cluster.getChildCount();
        return L.divIcon({
            html: `<div style="background:rgba(255,136,50,0.85);border:2px solid #fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:bold;color:#fff;">${n}</div>`,
            className: '', iconSize:[28,28], iconAnchor:[14,14]
        });
    }
});

// Un layerGroup individuel par monstre (mode "sélection")
const petLayersByIdx = {};

function makePetMarkerIcon(mon, large) {
    const sz = large ? 40 : 30;
    const iconHtml = mon.icon
        ? `<img src="data/pet_icons/${mon.icon}" style="width:${sz}px;height:${sz}px;border-radius:5px;display:block;box-shadow:0 0 4px #000a;">`
        : `<div style="width:${sz}px;height:${sz}px;background:#555;border-radius:5px;"></div>`;
    const hiddenBadge = mon.hidden
        ? `<div style="position:absolute;top:-5px;right:-5px;background:#f0c040;color:#000;border-radius:50%;width:13px;height:13px;font-size:9px;font-weight:bold;display:flex;align-items:center;justify-content:center;">★</div>`
        : '';
    return L.divIcon({
        html: `<div style="position:relative;width:${sz}px;height:${sz}px;">${iconHtml}${hiddenBadge}</div>`,
        className: '', iconSize:[sz,sz], iconAnchor:[sz/2,sz/2], popupAnchor:[0,-sz/2]
    });
}

CATCHABLE_SPAWNS.forEach((mon, idx) => {
    if (!mon.spawns.length) return;
    const clusterIcon = makePetMarkerIcon(mon, false);
    const soloIcon    = makePetMarkerIcon(mon, true);

    // Layer pour le cluster global
    mon.spawns.forEach(sp => {
        const hiddenLabel = sp.hidden ? ' <span style="color:#f0c040;">★ Caché</span>' : '';

    // Layer individuel (grand) pour la sélection
    const indivLayer = L.layerGroup();
    mon.spawns.forEach(sp => {
        const hiddenLabel = sp.hidden ? ' <span style="color:#f0c040;">★ Caché</span>' : '';
        L.marker(gameToLeaflet(sp.x, sp.y), { icon: soloIcon })
         .bindPopup(`<b>${mon.name}</b>${hiddenLabel}<br><small>jeu: (${sp.x}, ${sp.y})</small>`)
         .addTo(indivLayer);
    });
    petLayersByIdx[idx] = indivLayer;
});
petCluster.addTo(map);
let petLayerOn = true;

// ── Calques / filtres ─────────────────────────────────────────────
const togglesEl = document.getElementById('layer-toggles');

// Waypoints toggle
(function() {
    let on = true;
    const btn = document.createElement('div');
    btn.className = 'layer-toggle';
    btn.innerHTML = `<span class="dot" style="background:#64b4ff;border:2px solid #fff;"></span>Waypoints`;
    btn.addEventListener('click', () => {
        on = !on;
        if (on) { waypointLayer.addTo(map); btn.classList.remove('off'); }
        else    { waypointLayer.remove();   btn.classList.add('off'); }
    });
    togglesEl.appendChild(btn);
})();

// Capturables header + dropdown
const petSelectedIds = new Set(); // idx des monstres sélectionnés

const petHeader = document.createElement('div');
petHeader.className = 'pet-filter-header';
petHeader.innerHTML = `<span class="dot"></span>Capturables<span class="arrow">▼</span>`;
togglesEl.appendChild(petHeader);

const petDropdown = document.createElement('div');
petDropdown.className = 'pet-dropdown';

// Boutons Tous / Aucun
const actions = document.createElement('div');
actions.className = 'pet-dropdown-actions';
actions.innerHTML = `<button id="pet-select-all">Tous</button><button id="pet-select-none">Aucun</button>`;
petDropdown.appendChild(actions);

const scroll = document.createElement('div');
scroll.className = 'pet-dropdown-scroll';

CATCHABLE_SPAWNS.forEach((mon, idx) => {
    if (!mon.spawns.length) return;
    const opt = document.createElement('label');
    opt.className = 'pet-option';
    const imgEl = mon.icon
        ? `<img src="data/pet_icons/${mon.icon}">`
        : `<span class="no-img"></span>`;
    const star = mon.hidden ? `<span class="star">★</span>` : '';
    opt.innerHTML = `<input type="checkbox" data-idx="${idx}">${imgEl}<span>${mon.name}</span>${star}`;
    scroll.appendChild(opt);
});
petDropdown.appendChild(scroll);
togglesEl.appendChild(petDropdown);

function applyPetFilter() {
    if (!petLayerOn) return;
    if (petSelectedIds.size === 0) {
        // Mode cluster global
        petCluster.addTo(map);
        Object.values(petLayersByIdx).forEach(l => l.remove());
    } else {
        // Mode individuel : cacher le cluster, montrer uniquement les sélectionnés
        petCluster.remove();
        Object.entries(petLayersByIdx).forEach(([i, l]) => {
            if (petSelectedIds.has(Number(i))) l.addTo(map);
            else l.remove();
        });
    }
}

// Header : clic sur la flèche = dropdown, clic sur le reste = toggle on/off
petHeader.querySelector('.arrow').addEventListener('click', (e) => {
    e.stopPropagation();
    petDropdown.classList.toggle('open');
    petHeader.classList.toggle('open');
});

petHeader.addEventListener('click', () => {
    petLayerOn = !petLayerOn;
    petHeader.classList.toggle('off', !petLayerOn);
    if (petLayerOn) applyPetFilter();
    else { petCluster.remove(); Object.values(petLayersByIdx).forEach(l => l.remove()); }
});

// Checkboxes
scroll.addEventListener('change', (e) => {
    if (e.target.type !== 'checkbox') return;
    const idx = Number(e.target.dataset.idx);
    const opt = e.target.closest('.pet-option');
    if (e.target.checked) { petSelectedIds.add(idx); opt.classList.add('selected'); }
    else                  { petSelectedIds.delete(idx); opt.classList.remove('selected'); }
    applyPetFilter();
});

actions.querySelector('#pet-select-all').addEventListener('click', () => {
    scroll.querySelectorAll('input[type=checkbox]').forEach(cb => {
        cb.checked = true;
        cb.closest('.pet-option').classList.add('selected');
        petSelectedIds.add(Number(cb.dataset.idx));
    });
    applyPetFilter();
});
actions.querySelector('#pet-select-none').addEventListener('click', () => {
    scroll.querySelectorAll('input[type=checkbox]').forEach(cb => {
        cb.checked = false;
        cb.closest('.pet-option').classList.remove('selected');
    });
    petSelectedIds.clear();
    applyPetFilter();
});

// ── Calque monstres (cercles densité) ────────────────────────────
// Index MONSTER_SPAWNS par id pour accès rapide
const monSpawnIndex = {};
MONSTER_SPAWNS.forEach(m => { monSpawnIndex[m.id] = m; });

let currentMonLayer = null;

function showMonsterOnMap(monsterId) {
    if (currentMonLayer) { currentMonLayer.remove(); currentMonLayer = null; }
    const mon = monSpawnIndex[monsterId];
    if (!mon || !mon.zones.length) return;

    const maxN = Math.max(...mon.zones.map(z => z.n));
    currentMonLayer = L.layerGroup();

    mon.zones.forEach(z => {
        const ratio  = z.n / maxN;
        const radius = 6 + Math.round(ratio * 18);   // 6px → 24px
        const alpha  = 0.35 + ratio * 0.45;
        L.circleMarker(gameToLeaflet(z.x, z.y), {
            radius,
            color: '#fff',
            weight: 1,
            fillColor: '#a060ff',
            fillOpacity: alpha,
        }).bindPopup(`<b>${mon.name}</b><br>${z.n} spawn${z.n > 1 ? 's' : ''} dans cette zone`)
          .addTo(currentMonLayer);
    });
    currentMonLayer.addTo(map);

    // Zoom sur l'ensemble des zones
    const latlngs = mon.zones.map(z => gameToLeaflet(z.x, z.y));
    map.fitBounds(L.latLngBounds(latlngs), { padding: [40, 40], maxZoom: 1 });
}

// ── Filtre monstres UI ────────────────────────────────────────────
let monLayerOn = false; // off par défaut (s'active à la sélection)

const monHeader = document.createElement('div');
monHeader.className = 'mon-filter-header';
monHeader.innerHTML = `<span class="dot"></span>Monstres<span class="arrow">▼</span>`;
togglesEl.appendChild(monHeader);

const monSelectedCard = document.createElement('div');
monSelectedCard.className = 'mon-selected-card';
togglesEl.appendChild(monSelectedCard);

function setMonSelectedCard(mon) {
    const imgEl = mon.icon
        ? `<img src="data/pet_icons/${mon.icon}" onerror="this.style.display='none'">`
        : `<span class="no-img"></span>`;
    const count = mon.zones.reduce((s, z) => s + z.n, 0);
    monSelectedCard.innerHTML = `${imgEl}<span>${mon.name}<br><small style="color:#a080cc;">${count} spawn${count>1?'s':''} · ${mon.zones.length} zone${mon.zones.length>1?'s':''}</small></span>`;
    monSelectedCard.style.display = 'flex';
}

const monDropdown = document.createElement('div');
monDropdown.className = 'mon-filter-dropdown';

const monSearch = document.createElement('div');
monSearch.className = 'mon-filter-search';
monSearch.innerHTML = `<input type="text" placeholder="Rechercher un monstre…" id="mon-search-input">`;
monDropdown.appendChild(monSearch);

const monList = document.createElement('div');
monList.className = 'mon-filter-list';

let currentMonOption = null;
MONSTER_SPAWNS.forEach(mon => {
    const opt = document.createElement('div');
    opt.className = 'mon-option';
    opt.dataset.id   = mon.id;
    opt.dataset.name = mon.name.toLowerCase();
    const imgEl = mon.icon
        ? `<img src="data/pet_icons/${mon.icon}" onerror="this.style.display='none'">`
        : `<span class="no-img"></span>`;
    opt.innerHTML = `${imgEl}<span>${mon.name}</span>`;
    opt.addEventListener('click', () => {
        if (currentMonOption === opt) {
            // Déselectionner
            opt.classList.remove('selected');
            currentMonOption = null;
            if (currentMonLayer) { currentMonLayer.remove(); currentMonLayer = null; }
            monSelectedCard.style.display = 'none';
            monSelectedCard.innerHTML = '';
            monLayerOn = false;
            monDropdown.classList.remove('open');
            monHeader.classList.remove('open');
            return;
        }
        if (currentMonOption) currentMonOption.classList.remove('selected');
        opt.classList.add('selected');
        currentMonOption = opt;
        monLayerOn = true;
        monHeader.classList.remove('off');
        setMonSelectedCard(mon);
        showMonsterOnMap(mon.id);
        monDropdown.classList.remove('open');
        monHeader.classList.remove('open');
    });
    monList.appendChild(opt);
});
monDropdown.appendChild(monList);
togglesEl.appendChild(monDropdown);

// Recherche
document.getElementById('mon-search-input').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    monList.querySelectorAll('.mon-option').forEach(opt => {
        opt.style.display = opt.dataset.name.includes(q) ? '' : 'none';
    });
});

// Header : flèche = dropdown, corps = toggle
monHeader.querySelector('.arrow').addEventListener('click', e => {
    e.stopPropagation();
    monDropdown.classList.toggle('open');
    monHeader.classList.toggle('open');
});
monHeader.addEventListener('click', () => {
    if (!currentMonLayer) return;
    monLayerOn = !monLayerOn;
    monHeader.classList.toggle('off', !monLayerOn);
    if (monLayerOn) currentMonLayer.addTo(map);
    else currentMonLayer.remove();
});

// ── Lecture URL param ?monster=ID (depuis onglet monstres) ────────
(function() {
    const params = new URLSearchParams(window.location.search);
    const mid = params.get('monster');
    if (!mid) return;
    showMonsterOnMap(mid);
    monLayerOn = true;
    const mon = monSpawnIndex[mid];
    if (mon) {
        setMonSelectedCard(mon);
        const opt = monList.querySelector(`.mon-option[data-id="${mid}"]`);
        if (opt) { opt.classList.add('selected'); currentMonOption = opt; }
    }
})();

// ── Affichage coordonnées en temps réel (Désactivé) ─────────────

// ── Marqueurs ──────────────────────────────────────────────────────
const markers = [];

map.on('contextmenu', (e) => {
    const px = Math.round(e.latlng.lng);
    const py = Math.round(MAP_H - e.latlng.lat);

    const name = prompt('Nom du marqueur :', `Point (${px}, ${py})`);
    if (name === null) return;

    addMarker(e.latlng, name, px, py);
});


function addMarker(latlng, name, px, py) {
    const m = L.marker(latlng).addTo(map);
    m.bindPopup(`<b>${name}</b><br>px(${px}, ${py})`);
    markers.push({ latlng, name, px, py, marker: m });
    renderMarkerList();
}

function renderMarkerList() {
    const list = document.getElementById('marker-list');
    list.innerHTML = markers.map((m, i) =>
        `<div class="marker-item">
            <span>${m.name}</span>
            <span style="color:#888;font-size:0.7rem">(${m.px},${m.py})</span>
            <button onclick="removeMarker(${i})">✕</button>
        </div>`
    ).join('');
}

function removeMarker(i) {
    markers[i].marker.remove();
    markers.splice(i, 1);
    renderMarkerList();
}

</script>
</body>
</html>
